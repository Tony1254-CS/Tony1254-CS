<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 150" width="100%" height="auto">
  
  <defs>
    <style>
      .link { font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 500; fill: #888888; transition: fill 0.3s; }
      .icon { stroke: #888888; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; transition: stroke 0.3s; }
      svg:hover .link { fill: #FFFFFF; }
      svg:hover .icon { stroke: #FFFFFF; }
    </style>
  </defs>

  <rect width="120" height="150" fill="#000000"/>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.5s" dur="1s" fill="freeze"/>
    <g transform="translate(10, 75)">
      <g transform="translate(0, -15)">
        <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" class="icon"/>
        <rect x="2" y="9" width="4" height="12" class="icon"/>
        <circle cx="4" cy="4" r="2" class="icon"/>
      </g>
      <text x="32" y="0" class="link">LinkedIn</text>
    </g>
    <text x="110" y="75" fill="#444444" text-anchor="middle">•</text>
  </g>
</svg>