<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 450" width="100%" height="auto">
  <defs>
    <style>
      .name { font-family: Arial, Helvetica, sans-serif; font-size: 76px; font-weight: 800; letter-spacing: -2px; fill: url(#text-grad); text-anchor: middle; }
      .role { font-family: Arial, Helvetica, sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 5px; fill: #888888; text-anchor: middle; }
    </style>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="200%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="25%" stop-color="#71717A"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="75%" stop-color="#71717A"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
      <animate attributeName="x1" values="0%;-200%" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="200%;0%" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="blur-extreme" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
  </defs>

  <rect width="850" height="450" fill="#000000"/>
  
  <g filter="url(#blur-extreme)" opacity="0.6">
    <circle cx="250" cy="150" r="140" fill="#3B82F6" opacity="0.5">
      <animateTransform attributeName="transform" type="translate" values="0,0; 80,-50; -40,30; 0,0" dur="15s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="250" r="160" fill="#8B5CF6" opacity="0.4">
      <animateTransform attributeName="transform" type="translate" values="0,0; -60,40; 50,-30; 0,0" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle cx="425" cy="350" r="190" fill="#06B6D4" opacity="0.3">
      <animateTransform attributeName="transform" type="translate" values="0,0; 40,60; -50,-20; 0,0" dur="22s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g fill="#FFFFFF">
    <circle cx="150" cy="100" r="1.5" opacity="0"><animate attributeName="opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite" begin="0s"/></circle>
    <circle cx="700" cy="80" r="2" opacity="0"><animate attributeName="opacity" values="0;0.8;0" dur="5s" repeatCount="indefinite" begin="1s"/></circle>
    <circle cx="200" cy="300" r="1" opacity="0"><animate attributeName="opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite" begin="2s"/></circle>
    <circle cx="650" cy="350" r="2.5" opacity="0"><animate attributeName="opacity" values="0;0.7;0" dur="6s" repeatCount="indefinite" begin="0.5s"/></circle>
    <circle cx="425" cy="150" r="1.5" opacity="0"><animate attributeName="opacity" values="0;0.6;0" dur="4.5s" repeatCount="indefinite" begin="1.5s"/></circle>
    <circle cx="100" cy="400" r="2" opacity="0"><animate attributeName="opacity" values="0;0.4;0" dur="5.5s" repeatCount="indefinite" begin="2.5s"/></circle>
    <circle cx="800" cy="250" r="1" opacity="0"><animate attributeName="opacity" values="0;0.8;0" dur="3.5s" repeatCount="indefinite" begin="0.2s"/></circle>
  </g>

  <rect width="850" height="450" fill="#000000" opacity="0.4"/>

  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.2s" dur="1.5s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0,20; 0,0" begin="0.2s" dur="1.5s" fill="freeze"/>
    <text x="425" y="240" class="name">SABBIR AHMED</text>
  </g>
  
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.5s" dur="1.5s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0,20; 0,0" begin="0.5s" dur="1.5s" fill="freeze"/>
    <text x="425" y="290" class="role">MACHINE LEARNING • CYBERSECURITY • RESEARCH</text>
    <line x1="375" y1="330" x2="475" y2="330" stroke="#333333" stroke-width="2"/>
    <circle cx="425" cy="330" r="3" fill="#FFFFFF"/>
  </g>
</svg>